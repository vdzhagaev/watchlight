name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: 1.25
            - name: Vet
              run: go vet ./...
            - name: Build
              run: go build ./...
            - name: Test
              run: go test ./...
